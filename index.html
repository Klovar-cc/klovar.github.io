<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klovar.cc | Tasks</title>
    <style>
        :root { --bg: #1a1614; --panel: #2a2420; --border: #4a3f35; --text: #e0d5c1; --orange: #f39c12; --green: #238636; --bsky: #0085ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 700px; position: relative; }
        
        /* Header & Live BlueSky Card */
        .hero-wrapper { position: relative; width: 100%; margin-bottom: 30px; }
        .hero { border: 2px solid var(--orange); border-radius: 12px; padding: 30px; text-align: center; background: rgba(0,0,0,0.4); transition: 0.3s; text-decoration: none; display: block; z-index: 10; position: relative; }
        .hero:hover { background: rgba(243, 156, 18, 0.1); transform: translateY(-2px); }
        h1 { color: var(--orange); font-size: 2.2rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .profile-preview {
            display: none; position: absolute; top: 105%; left: 50%; transform: translateX(-50%);
            width: 340px; background: #000; border: 1px solid #333; border-radius: 16px; overflow: hidden; z-index: 2000;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); pointer-events: none; font-family: -apple-system, sans-serif;
        }
        .hero-wrapper:hover .profile-preview { display: block; }
        #bsky-banner { height: 90px; background: var(--bsky); background-size: cover; background-position: center; width: 100%; }
        .bsky-info { padding: 15px; position: relative; text-align: left; }
        #bsky-pfp { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #000; position: absolute; top: -32px; left: 15px; background: #222; background-size: cover; }
        .bsky-btn { float: right; background: #fff; color: #000; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .bsky-name { display: block; margin-top: 35px; font-weight: 800; font-size: 1.1rem; color: #fff; }
        .bsky-handle { color: #888; font-size: 0.85rem; }
        #bsky-bio { color: #eee; font-size: 0.85rem; margin-top: 10px; line-height: 1.4; }
        .bsky-stats { margin-top: 10px; color: #888; font-size: 0.8rem; }
        .bsky-stats b { color: #fff; }

        /* Tasks & Layout */
        .tier-label { color: var(--orange); font-size: 0.9rem; margin-top: 35px; display: block; text-transform: uppercase; border-left: 4px solid var(--orange); padding-left: 12px; cursor: pointer; }
        .item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: rgba(42, 36, 32, 0.4); cursor: pointer; position: relative; transition: 0.2s; }
        .item:hover { background: rgba(243, 156, 18, 0.1); border-left: 2px solid var(--orange); }
        .briefing { display: none; position: absolute; left: 105%; top: 50%; transform: translateY(-50%); width: 280px; background: var(--panel); border: 1px solid var(--orange); padding: 15px; z-index: 1500; border-radius: 8px; font-size: 0.85rem; pointer-events: none; box-shadow: 10px 10px 30px rgba(0,0,0,0.7); line-height: 1.4; color: #f1c40f; }
        .item:hover .briefing { display: block; }
        .check { width: 18px; height: 18px; border: 1px solid var(--border); margin-right: 15px; border-radius: 3px; flex-shrink: 0; }
        .done { color: #7f8c8d; opacity: 0.6; }
        .done span { text-decoration: line-through; }
        .done .check { background: var(--green); border-color: var(--green); position: relative; }
        .done .check::after { content: '✕'; color: white; font-size: 14px; position: absolute; left: 2px; top: -2px; }

        /* Detail/Footer */
        #detail-view { display: none; width: 100%; max-width: 700px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 40px; box-sizing: border-box; }
        .nav-row { display: flex; justify-content: space-between; margin-top: 40px; }
        .nav-btn { background: #1f2937; border: 1px solid var(--border); color: var(--text); padding: 10px 20px; text-decoration: none; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .nav-btn:hover { background: var(--orange); color: #000; }
        .kofi { display: block; text-align: center; margin-top: 50px; background: #ff5e5b; color: white; padding: 16px; text-decoration: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .kofi:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="main-view" class="container">
        <div class="hero-wrapper">
            <a href="https://bsky.app/profile/klovar.cc" class="hero" target="_blank"><h1>KLOVAR TASKS</h1></a>
            <div class="profile-preview">
                <div id="bsky-banner"></div>
                <div class="bsky-info">
                    <div id="bsky-pfp"></div>
                    <div class="bsky-btn">Follow</div>
                    <span class="bsky-name" id="bsky-name">Klovar</span>
                    <span class="bsky-handle">@klovar.cc</span>
                    <p id="bsky-bio">Connecting to the frontier...</p>
                    <div class="bsky-stats" id="bsky-stats">-- Followers</div>
                </div>
            </div>
        </div>
        <div id="list">Loading data stream...</div>
        <a href="https://ko-fi.com/stickemupgame" class="kofi" target="_blank">Support Stick 'Em Up! (Ko-fi)</a>
    </div>

    <div id="detail-view" class="container">
        <h2 id="detail-title" style="color:var(--orange); text-transform: uppercase;"></h2>
        <span id="detail-status" style="font-weight:bold; display:block; margin-bottom:15px;"></span>
        <p id="detail-desc" style="line-height:1.7; color:#bdc3c7; font-size:1.05rem; white-space: pre-wrap;"></p>
        <hr style="border:0; border-top:1px solid var(--border); margin:30px 0;">
        <div id="detail-specs" style="font-size:0.95rem; font-family:sans-serif; color:#e0d5c1;"></div>
        <div class="nav-row"><a href="?" class="nav-btn">← BACK OUT</a><a href="#" id="next-btn" class="nav-btn">NEXT ITEM →</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBQm_CtzkeFCu4prCBOGG3j2ZuSd7IEf_0", authDomain: "klovar-cc.firebaseapp.com", projectId: "klovar-cc", databaseURL: "https://klovar-cc-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fetch Live BlueSky Data via DID
        async function fetchBlueSky() {
            try {
                const res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=did:plc:ff4cxlsundouzns5feve35qs`);
                const profile = await res.json();
                document.getElementById('bsky-name').innerText = profile.displayName || 'Klovar';
                document.getElementById('bsky-bio').innerText = profile.description || '';
                document.getElementById('bsky-stats').innerHTML = `<b>${profile.followersCount}</b> Followers • <b>${profile.followsCount}</b> Following`;
                document.getElementById('bsky-pfp').style.backgroundImage = `url(${profile.avatar})`;
                document.getElementById('bsky-banner').style.backgroundImage = `url(${profile.banner})`;
            } catch (e) { console.error("BSKY Fetch Failed"); }
        }
        fetchBlueSky();

        // The New Organic Schema
        const schema = [
            { id: "tier1", name: "The Iron & The Network", tasks: [
                { id: "t1_sub0", name: "The 5950X Saturday Surgery", 
                  brief: "My CPU is running too hot. Stripping the Kraken AIO, cleaning it up, and laying down fresh Kryonaut.", 
                  extended: "Honestly, the Ryzen 9 5950X has been running way too hot lately. Every time I drop into Fortnite or fire up Zenless Zone Zero, the thermals start creeping up and I'm losing frames.\n\nThe exact goal here is a full teardown: I'm pulling the NZXT Kraken X73 AIO cooler off, scrubbing the old thermal paste away with 99% isopropyl alcohol, and laying down a fresh coat of Thermal Grizzly Kryonaut. It's a slightly MacGyvered process, but it's the only way to get my system back to peak performance without thermal throttling.", 
                  specs: "Gear: 99% IPA, Kryonaut, Patience" },
                { id: "t1_sub1", name: "Expanding the 61.8TB Vault", 
                  brief: "Racking new 8TB WD Reds into the NAS for more Plex storage.", 
                  extended: "My Plex server is absolutely ravenous. I'm currently sitting on over 49 terabytes of TV shows alone (we're talking 17,000+ episodes), plus all my movies and 4K KATSEYE performance rips.\n\nThe exact goal is to physically rack a couple of new 8TB WD Red Plus drives into my Synology DS1019+ NAS. Once they're in, I'll expand the SHR volume to give the system some breathing room before I literally run out of bytes.", 
                  specs: "Hardware: WD Red Plus 8TB, DS1019+" },
                { id: "t1_sub2", name: "The 182GB Nvidia Offload", 
                  brief: "Pushing massive local Shadowplay captures over the 2.5Gbps link.", 
                  extended: "I've been hoarding local Nvidia Shadowplay captures on my M.2 NVMe drive, and it's eating up 182GB of space that I desperately need for actual games.\n\nThe exact goal is to run a Robocopy script and push all those massive video files across my internal 2.5Gbps network fabric straight into the main NAS archive. Just doing some digital housekeeping so my C: drive can breathe.", 
                  specs: "Protocol: Robocopy / 2.5Gbps Link" }
            ]},
            { id: "tier2", name: "Automation & Media", tasks: [
                { id: "t2_sub0", name: "Tdarr H.265 Crunching", 
                  brief: "Using the 3080 Ti to transcode massive video files down to HEVC.", 
                  extended: "Raw video files are massive, and I'm tired of them taking up terabytes of space.\n\nThe exact goal is to spin up a Tdarr node in Docker and let my RTX 3080 Ti use its NVENC encoder to automatically crush those files down into H.265 (HEVC) format. It’s an ad-hoc server automation that runs in the background while I sleep, saving me space without losing video quality.", 
                  specs: "Node: SERVER1 / NVENC H.265" },
                { id: "t2_sub1", name: "Immich S25 Ultra Sync", 
                  brief: "Setting up auto-sync to ditch cloud storage limits forever.", 
                  extended: "I refuse to pay for cloud storage limits anymore.\n\nThe exact goal is to deploy Immich on the server and set up my Galaxy S25 Ultra to automatically back up every photo and video I take directly to my own NAS over Wi-Fi 6. It's basically a self-hosted, private version of Google Photos that taps straight into my 60TB vault.", 
                  specs: "Target: Local Immich Instance" },
                { id: "t2_sub2", name: "Stream Deck & F1 Weekend Prep", 
                  brief: "Optimizing the Razer/Elgato setup and tracking F1 telemetry.", 
                  extended: "The exact goal here is to optimize my desk setup before the weekend hits.\n\nI need to calibrate my Stream Deck XL profiles so I'm not fumbling around while switching scenes or opening apps. Plus, I need to get my Odyssey G5 monitors prepped to track F1 Fantasy and live telemetry—especially keeping an eye on those 2026 wet tyre procedures and Alonso's lap times.", 
                  specs: "Gear: Stream Deck XL / 34\" Odyssey G5" }
            ]},
            { id: "tier3", name: "The Daily Grind", tasks: [
                { id: "t3_sub0", name: "Resume & Portfolio Injection", 
                  brief: "Adding homelab networking and storage metrics to my CV.", 
                  extended: "Building this website and managing a 61.8TB server isn't just for fun—it's actual IT engineering.\n\nThe exact goal is to inject all these homelab stats, Docker deployments, and 2.5Gbps networking metrics directly into my resume. I'm actively hunting for a Junior Sysadmin or IT Support role around Roswell, and I need my portfolio to reflect the real-world tech I manage every single day.", 
                  specs: "Target: IT Support / SysAdmin" },
                { id: "t3_sub1", name: "Stick 'Em Up! Dev Push", 
                  brief: "Squashing bugs and refining the gameplay loop.", 
                  extended: "Between the server maintenance and the job hunt, I'm still grinding away on game development.\n\nThe exact goal is to squash the current bugs in 'Stick 'Em Up!', refine the gameplay loop, and inch closer to a stable build. It takes a lot of late nights and coffee, which is exactly why the Ko-fi link is sitting at the bottom of this page.", 
                  specs: "Focus: Unity / Game Dev" },
                { id: "t3_sub2", name: "Maintain klovar.cc Framework", 
                  brief: "Keeping this Firebase-linked dashboard running smoothly.", 
                  extended: "You're looking at it.\n\nThe exact goal is to keep this Firebase-linked, GitHub Pages-hosted command center running smoothly. It's a live-updating brain dump of my projects, linked straight to my BlueSky. It acts as a public accountability mirror and a live portfolio of my front-end and database integration skills.", 
                  specs: "Stack: Firebase / Web" }
            ] }
        ];

        const allItemsFlat = schema.flatMap(tier => [tier, ...tier.tasks]);
        const urlParams = new URLSearchParams(window.location.search);
        const currentId = urlParams.get('deepdive');

        if (currentId) {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            renderDetailPage(currentId);
        } else { renderMainList(); }

        function renderMainList() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            schema.forEach(section => {
                const label = document.createElement('span'); label.className = 'tier-label'; label.innerText = section.name; 
                label.onclick = () => window.location.href = `?deepdive=${section.id}`;
                listDiv.appendChild(label);
                section.tasks.forEach(task => {
                    const div = document.createElement('div'); div.id = `row-${task.id}`; div.className = "item";
                    div.onclick = () => window.location.href = `?deepdive=${task.id}`;
                    div.innerHTML = `<div class="check"></div><span>${task.name}</span><div class="briefing"><b>Briefing:</b><br>${task.brief}</div>`;
                    listDiv.appendChild(div);
                });
            });
        }

        function renderDetailPage(id) {
            const item = allItemsFlat.find(i => i.id === id);
            if (!item) return;
            document.getElementById('detail-title').innerText = item.name;
            // Uses the long-form organic text
            document.getElementById('detail-desc').innerText = item.extended || item.brief;
            const specsEl = document.getElementById('detail-specs');
            if (item.specs) { specsEl.innerHTML = `<b>SYSTEM SPECS / TARGET:</b><br>${item.specs}`; }
            const currentIndex = allItemsFlat.findIndex(i => i.id === id);
            const nextItem = allItemsFlat[currentIndex + 1];
            const nextBtn = document.getElementById('next-btn');
            if (nextItem) { nextBtn.href = `?deepdive=${nextItem.id}`; } else { nextBtn.style.display = 'none'; }
        }

        onValue(ref(db, 'subtasks'), (snap) => {
            const data = snap.val() || {};
            allItemsFlat.forEach(item => {
                const row = document.getElementById(`row-${item.id}`);
                if (row) { data[item.id] ? row.classList.add('done') : row.classList.remove('done'); }
            });
            if (currentId) {
                const statusEl = document.getElementById('detail-status');
                if (data[currentId]) { statusEl.innerText = "● STATUS: SECURED"; statusEl.style.color = "var(--green)"; }
                else { statusEl.innerText = "● STATUS: IN PROGRESS"; statusEl.style.color = "var(--orange)"; }
            }
        });
    </script>
</body>
</html>
