<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>klovar.cc | Tasks</title>
    <style>
        :root { --bg: #1a1614; --panel: #2a2420; --border: #4a3f35; --text: #e0d5c1; --blue: #f39c12; --green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        h1 { color: var(--blue); text-align: center; border-bottom: 2px solid var(--blue); padding-bottom: 15px; text-transform: uppercase; }
        .tier-label { color: var(--blue); font-size: 0.9rem; margin-top: 30px; display: block; text-transform: uppercase; border-left: 4px solid var(--blue); padding-left: 10px; }
        .item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: rgba(42, 36, 32, 0.4); }
        .check { width: 18px; height: 18px; border: 2px solid var(--border); margin-right: 15px; border-radius: 4px; flex-shrink: 0; }
        .done { color: #7f8c8d; opacity: 0.6; }
        .done span { text-decoration: line-through; }
        .done .check { background: var(--green); border-color: var(--green); position: relative; }
        .done .check::after { content: '✕'; color: black; font-size: 14px; font-weight: bold; position: absolute; left: 2px; top: -2px; }
        .footer-links { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; }
        .btn { display: block; text-align: center; padding: 15px; text-decoration: none; border-radius: 8px; border: 2px solid var(--border); font-size: 1rem; font-weight: bold; color: white; text-transform: uppercase; transition: 0.3s; }
        .kofi { background: #ff5e5b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ Klovar Tasks ]</h1>
        <div id="list"></div>
        <div class="footer-links">
            <a href="https://ko-fi.com/klovar" class="btn kofi" target="_blank">Support via Ko-fi</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyBQm_CtzkeFCu4prCBOGG3j2ZuSd7IEf_0", authDomain: "klovar-cc.firebaseapp.com", projectId: "klovar-cc", databaseURL: "https://klovar-cc-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const tasks = [
            { id: "t1_main", tier: "Infrastructure & Hardware", name: "System Maintenance & Upgrades" },
            { id: "t2_main", tier: "Server & Media Engine", name: "Storage & Transcoding Pipeline" },
            { id: "t5_main", tier: "Career & Portfolio", name: "Professional Matrix Update" }
        ];

        const listDiv = document.getElementById('list');
        tasks.forEach(t => {
            if(t.tier) { const label = document.createElement('span'); label.className = 'tier-label'; label.innerText = t.tier; listDiv.appendChild(label); }
            const div = document.createElement('div'); div.id = "row-" + t.id; div.className = "item";
            div.innerHTML = `<div class="check"></div><span>${t.name}</span>`;
            listDiv.appendChild(div);
        });

        onValue(ref(db), (snap) => {
            const data = snap.val() || {};
            const taskData = data.tasks || {};
            tasks.forEach(t => {
                const row = document.getElementById("row-" + t.id);
                taskData[t.id] ? row.classList.add('done') : row.classList.remove('done');
            });
        });
    </script>
</body>
</html>
