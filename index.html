<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>klovar.cc | Master Command Center</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; padding: 40px; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .project-block { background: #161b22; border: 1px solid #30363d; padding: 20px; margin-bottom: 20px; border-radius: 6px; }
        .completed { text-decoration: line-through; color: #8b949e; opacity: 0.6; transition: 0.3s; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 12px; font-size: 1.1em; display: flex; align-items: center; }
        .status-tag { color: #7ee787; font-weight: bold; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <h1>[ klovar.cc // MASTER COMMAND CENTER ]</h1>
    <span class="status-tag">● LIVE_SYNC_ENABLED</span>

    <div class="project-block">
        <h2>► Infrastructure & Hardware</h2>
        <ul id="task-list">
            <li id="task1"><span>Data Migration: 182GB Photo Robocopy</span></li>
            <li id="task2"><span>Saturday Surgery: Clean 5950X & Repaste</span></li>
            <li id="task3"><span>Saturday Surgery: Replace 120mm Fan</span></li>
            <li id="task4"><span>Array Build: Mount WD Red Drives</span></li>
            <li id="task5"><span>Cloud Sync: Verify 2000 KB/s limit</span></li>
        </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQm_CtzkeFCu4prCBOGG3j2ZuSd7IEf_0",
            authDomain: "klovar-cc.firebaseapp.com",
            projectId: "klovar-cc",
            databaseURL: "https://klovar-cc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'tasks'), (snapshot) => {
            const data = snapshot.val() || {};
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    data[id] ? el.classList.add('completed') : el.classList.remove('completed');
                }
            });
        });
    </script>
</body>
</html>
