<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>klovar.cc | Tasks</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --kofi: #ff5e5b; }
        body { background: var(--bg); color: var(--text); font-family: monospace; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--blue); text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; text-transform: uppercase; }
        .tier-label { color: #8b949e; font-size: 0.8rem; margin-top: 25px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .item { padding: 12px; border-bottom: 1px solid #21262d; display: flex; align-items: center; }
        .check { width: 16px; height: 16px; border: 1px solid var(--border); margin-right: 15px; border-radius: 3px; flex-shrink: 0; }
        .done { color: #8b949e; opacity: 0.6; }
        .done span { text-decoration: line-through; }
        .done .check { background: var(--green); border-color: var(--green); position: relative; }
        .done .check::after { content: '✔'; color: white; font-size: 10px; position: absolute; left: 2px; top: -1px; }
        
        .log-box { margin-top: 30px; background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 6px; }
        .log-title { color: var(--blue); font-size: 0.8rem; margin-bottom: 10px; display: block; }
        #status-log { color: #7ee787; font-size: 0.95rem; line-height: 1.4; }
        
        .footer-links { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; }
        .btn { display: block; text-align: center; padding: 12px; text-decoration: none; border-radius: 6px; border: 1px solid var(--border); font-size: 0.9rem; transition: 0.2s; color: white; }
        .share { background: #1f2937; }
        .kofi { background: var(--kofi); border-color: #d14d4d; font-weight: bold; }
        .btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ KLOVAR TASKS ]</h1>
        <div id="list"></div>
        
        <div class="log-box">
            <span class="log-title">LATEST_STATUS_UPDATE:</span>
            <div id="status-log">Initializing sync...</div>
        </div>

        <div class="footer-links">
            <a id="share-link" class="btn share" target="_blank" href="#">SHARE PROGRESS TO BLUESKY</a>
            <a href="https://ko-fi.com/klovar" class="btn kofi" target="_blank">SUPPORT VIA KO-FI</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQm_CtzkeFCu4prCBOGG3j2ZuSd7IEf_0",
            authDomain: "klovar-cc.firebaseapp.com",
            projectId: "klovar-cc",
            databaseURL: "https://klovar-cc-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const tasks = [
            { id: "t1_1", tier: "Infrastructure", name: "Moving Files to Main Storage (182GB)" },
            { id: "t1_2", tier: "", name: "Deep Cleaning PC & New Thermal Paste" },
            { id: "t1_3", tier: "", name: "Installing New Hard Drive Array" },
            { id: "t2_1", tier: "Media & Server", name: "Speeding up Video Conversions" },
            { id: "t2_2", tier: "", name: "Setting up Automatic Photo Backups" },
            { id: "t4_1", tier: "Game Dev: Stick 'Em Up!", name: "Refining Player Movement & Controls" },
            { id: "t4_2", tier: "", name: "Writing Lore & World Building" },
            { id: "t5_1", tier: "Professional", name: "Polishing Technical Resume" },
            { id: "t5_2", tier: "", name: "Applying for Daily Career Opportunities" }
        ];

        const listDiv = document.getElementById('list');
        tasks.forEach(t => {
            if(t.tier) {
                const label = document.createElement('span');
                label.className = 'tier-label';
                label.innerText = t.tier;
                listDiv.appendChild(label);
            }
            const div = document.createElement('div');
            div.id = "row-" + t.id;
            div.className = "item";
            div.innerHTML = `<div class="check"></div><span>${t.name}</span>`;
            listDiv.appendChild(div);
        });

        onValue(ref(db), (snap) => {
            const data = snap.val() || {};
            const taskData = data.tasks || {};
            let count = 0;
            tasks.forEach(t => {
                const row = document.getElementById("row-" + t.id);
                if (taskData[t.id]) { row.classList.add('done'); count++; }
                else { row.classList.remove('done'); }
            });
            document.getElementById('status-log').innerText = data.log || "No status update yet.";
            const text = encodeURIComponent(`Klovar Task Update: [${count}/${tasks.length}] goals reached. View the live checklist:`);
            document.getElementById('share-link').href = `https://bsky.app/intent/compose?text=${text}&url=https://klovar.cc`;
        });
    </script>
</body>
</html>
