<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>klovar.cc | Tasks</title>
    <style>
        :root { --bg: #1a1614; --panel: #2a2420; --border: #4a3f35; --text: #e0d5c1; --orange: #f39c12; --green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        h1 { color: var(--orange); text-align: center; border-bottom: 2px solid var(--orange); padding-bottom: 15px; text-transform: uppercase; }
        .tier-label { color: var(--orange); font-size: 0.9rem; margin-top: 30px; display: block; text-transform: uppercase; border-left: 4px solid var(--orange); padding-left: 10px; margin-bottom: 10px; }
        .item { padding: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: rgba(42, 36, 32, 0.4); }
        .check { width: 16px; height: 16px; border: 1px solid var(--border); margin-right: 15px; border-radius: 3px; flex-shrink: 0; }
        .done { color: #7f8c8d; opacity: 0.6; }
        .done span { text-decoration: line-through; }
        .done .check { background: var(--green); border-color: var(--green); position: relative; }
        .done .check::after { content: '✕'; color: black; font-size: 14px; font-weight: bold; position: absolute; left: 2px; top: -2px; }
        .kofi { display: block; text-align: center; margin-top: 40px; background: #ff5e5b; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ Klovar Tasks ]</h1>
        <div id="list"></div>
        <a href="https://ko-fi.com/klovar" class="kofi" target="_blank">Support via Ko-fi</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBQm_CtzkeFCu4prCBOGG3j2ZuSd7IEf_0", authDomain: "klovar-cc.firebaseapp.com", projectId: "klovar-cc", databaseURL: "https://klovar-cc-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const schema = [
            { tier: "Infrastructure & Hardware", tasks: ["182GB File Migration", "Deep Cleaning 5950X", "Apply New Thermal Paste", "Mount WD Red Drive Array"] },
            { tier: "Server & Media Engine", tasks: ["Configure Tdarr H.265 Node", "Verify 2.5Gbps Network Link", "Initialize Immich Photo Backup"] },
            { tier: "Career & Portfolio", tasks: ["Resume: Add Home Lab Metrics", "Portfolio: Update klovar.cc Layout", "Career: Log 3 Daily Applications"] }
        ];

        const listDiv = document.getElementById('list');
        schema.forEach((section, sIndex) => {
            const label = document.createElement('span');
            label.className = 'tier-label';
            label.innerText = section.tier;
            listDiv.appendChild(label);

            section.tasks.forEach((task, tIndex) => {
                const div = document.createElement('div');
                div.id = `task-t${sIndex + 1}_sub${tIndex}`;
                div.className = "item";
                div.innerHTML = `<div class="check"></div><span>${task}</span>`;
                listDiv.appendChild(div);
            });
        });

        onValue(ref(db, 'subtasks'), (snap) => {
            const data = snap.val() || {};
            document.querySelectorAll('.item').forEach(el => {
                const id = el.id.replace('task-', '');
                data[id] ? el.classList.add('done') : el.classList.remove('done');
            });
        });
    </script>
</body>
</html>
