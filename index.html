<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>klovar.cc | Operations</title>
    <style>
        :root { --bg: #1a1614; --panel: #2a2420; --border: #4a3f35; --text: #e0d5c1; --orange: #f39c12; --green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        .hero { width: 100%; border: 2px solid var(--orange); border-radius: 12px; padding: 35px 10px; text-align: center; margin-bottom: 30px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)); }
        h1 { color: var(--orange); font-size: 2.4rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .tier-label { color: var(--orange); font-size: 0.9rem; margin-top: 35px; display: block; text-transform: uppercase; border-left: 4px solid var(--orange); padding-left: 12px; margin-bottom: 12px; }
        .item { padding: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: rgba(42, 36, 32, 0.4); }
        .check { width: 18px; height: 18px; border: 2px solid var(--border); margin-right: 15px; border-radius: 3px; flex-shrink: 0; }
        .done { color: #7f8c8d; opacity: 0.6; }
        .done span { text-decoration: line-through; }
        .done .check { background: var(--green); border-color: var(--green); position: relative; }
        .done .check::after { content: '✕'; color: black; font-size: 14px; font-weight: bold; position: absolute; left: 2px; top: -2px; }
        .log-box { margin-top: 35px; background: var(--panel); border: 1px dashed var(--orange); padding: 18px; border-radius: 8px; }
        #status-log { color: #f1c40f; font-size: 1.1rem; }
        .kofi { display: block; text-align: center; margin-top: 40px; background: #ff5e5b; color: white; padding: 16px; text-decoration: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; border: 1px solid #4a3f35; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero"><h1>KLOVAR OPERATIONS</h1></div>
        <div id="list"></div>
        <div class="log-box"><div id="status-log">Broadcasting from the Frontier...</div></div>
        <a href="https://ko-fi.com/klovar" class="kofi" target="_blank">Support the Outlaw (Ko-fi)</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyBQm_CtzkeFCu4prCBOGG3j2ZuSd7IEf_0", authDomain: "klovar-cc.firebaseapp.com", projectId: "klovar-cc", databaseURL: "https://klovar-cc-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const schema = [
            { tier: "Hardware & Iron Surgery", tasks: ["Phase 1: 182GB Data Extraction", "Phase 2: 5950X Thermal Refresh", "Phase 3: 8TB WD Red Array Integration"] },
            { tier: "The Media Engine", tasks: ["Stream Pipeline: OBS 1440p Calibration", "Ingest: Tdarr H.265 Automation", "Vault: Immich Mobile Sync Deployment"] },
            { tier: "The Professional Frontier", tasks: ["Portfolio: Update klovar.cc Core Site", "Resume: Inject 60TB Systems Metrics", "The Hunt: Execute Daily Job Matrix"] }
        ];

        const listDiv = document.getElementById('list');
        schema.forEach((section, sIndex) => {
            const label = document.createElement('span'); label.className = 'tier-label'; label.innerText = section.tier; listDiv.appendChild(label);
            section.tasks.forEach((task, tIndex) => {
                const div = document.createElement('div');
                div.id = `task-t${sIndex + 1}_sub${tIndex}`;
                div.className = "item";
                div.innerHTML = `<div class="check"></div><span>${task}</span>`;
                listDiv.appendChild(div);
            });
        });

        onValue(ref(db), (snap) => {
            const data = snap.val() || {};
            const subs = data.subtasks || {};
            document.querySelectorAll('.item').forEach(el => {
                const id = el.id.replace('task-', '');
                subs[id] ? el.classList.add('done') : el.classList.remove('done');
            });
            document.getElementById('status-log').innerText = data.log || "No status update yet.";
        });
    </script>
</body>
</html>
